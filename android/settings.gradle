include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'
include ':capacitor-google-auth'

project(':capacitor-google-auth').projectDir = new File(rootProject.projectDir, '../node_modules/@codetrix-studio/capacitor-google-auth/android')

include ':capacitor-voice-recorder'
project(':capacitor-voice-recorder').projectDir = new File(rootProject.projectDir, '../node_modules/capacitor-voice-recorder/android')
