name: Build Pro Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }

      - name: Build and Sync
        run: |
          npm install
          npm run build
          npx cap add android || true
          
          # حقن الإعدادات في Manifest (الأذونات ولوحة المفاتيح)
          sed -i '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" />\
          <uses-permission android:name="android.permission.RECORD_AUDIO" />\
          <uses-permission android:name="android.permission.CAMERA" />\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          
          sed -i 's/android:windowSoftInputMode=".*"/android:windowSoftInputMode="adjustResize"/' android/app/src/main/AndroidManifest.xml || \
          sed -i '/android:name=".MainActivity"/a \            android:windowSoftInputMode="adjustResize"' android/app/src/main/AndroidManifest.xml

          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
