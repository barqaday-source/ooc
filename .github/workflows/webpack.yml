name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug Manifest
        run: |
          echo "--- Checking AndroidManifest.xml ---"
          cat android/app/src/main/AndroidManifest.xml

      - name: Verify Plugin Configuration
        run: |
          echo "--- Verifying Plugin Registration in MainActivity.java ---"
          # البحث عن GoogleAuth و VoiceRecorder في ملف MainActivity
          if grep -q "GoogleAuth" android/app/src/main/java/*/MainActivity.java && grep -q "VoiceRecorder" android/app/src/main/java/*/MainActivity.java; then
            echo "All plugins found!"
          else
            echo "::error:: Missing Plugin Configuration! Ensure GoogleAuth and VoiceRecorder are registered in MainActivity.java"
            exit 1
          fi

      - name: Build and Sign APK
        run: |
          # نستخدم المسار الكامل للملف لضمان عدم ضياعه
          KEYSTORE_PATH=$(pwd)/android/app/my-release-key.keystore
          cd android
          ./gradlew clean assembleRelease \
          -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
          -Pandroid.injected.signing.store.password=123456 \
          -Pandroid.injected.signing.key.alias=dardshati \
          -Pandroid.injected.signing.key.password=123456

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
