name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean & Prepare Environment
        run: |
          # مسح شامل لأي كاش سابق
          rm -rf node_modules
          rm -rf android/.gradle
          rm -rf android/app/build
          
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: |
          # حذف مجلد الأندرويد القديم بالكامل وإعادة إنشائه لضمان عدم وجود ملفات قديمة
          rm -rf android
          npx cap add android
          npx cap copy android
          npx cap update android
          npx cap sync android

      - name: Build and Sign APK
        run: |
          cd android
          # التوقيع الثابت (بدون تغيير أي ملفات إعدادات)
          ./gradlew assembleDebug -Pandroid.injected.signing.store.file=my-release-key.keystore -Pandroid.injected.signing.store.password=123456 -Pandroid.injected.signing.key.alias=dardshati -Pandroid.injected.signing.key.password=123456

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
