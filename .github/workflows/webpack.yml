name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # التعديل هنا: تثبيت المكتبات بشكل صريح قبل البناء
      - name: Install Dependencies
        run: |
          npm install
          npm install framer-motion # إجبار السيرفر على تثبيت المكتبة المفقودة
        
      - name: Build Web App
        run: npm run build
        
      - name: Build Android
        run: |
          npx cap add android || true
          npx cap sync android
          cd android
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardshati-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
