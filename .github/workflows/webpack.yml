name: Build Pro Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }

      - name: Build and Sync
        run: |
          # 1. التثبيت وتجاوز الصراعات
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/cli @codetrix-studio/capacitor-google-auth --legacy-peer-deps
          npm run build
          
          # 2. تهيئة بيئة الأندرويد
          rm -rf android
          npx cap add android
          echo "Waiting for project structure..."
          sleep 10
          
          # 3. ضبط الـ SDK (رفع الـ minSdk إلى 24 لحل تعارض Google Auth)
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle

          # 4. حقن الأذونات بذكاء (مسح القديم ثم إضافة الجديد)
          sed -i '/<uses-permission/d' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" />\
          <uses-permission android:name="android.permission.RECORD_AUDIO" />\
          <uses-permission android:name="android.permission.CAMERA" />\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          
          # 5. ضبط الكيبورد
          sed -i 's/android:windowSoftInputMode=".*"/android:windowSoftInputMode="adjustResize"/' android/app/src/main/AndroidManifest.xml || \
          sed -i '/android:name=".MainActivity"/a \            android:windowSoftInputMode="adjustResize"' android/app/src/main/AndroidManifest.xml

          # 6. حقن مكتبة Google Auth
          find android/app/src/main/java -name "MainActivity.java" -exec sed -i '/import com.getcapacitor.BridgeActivity;/a import com.codetrixstudio.capacitor.GoogleAuth.GoogleAuth;' {} +
          find android/app/src/main/java -name "MainActivity.java" -exec sed -i '/super.onCreate(savedInstanceState);/i \    registerPlugin(GoogleAuth.class);' {} +
          
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
