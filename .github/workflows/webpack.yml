name: Build Native Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Java & Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Install & Build Native Shell
        run: |
          npm cache clean --force  # تنظيف الكاش لضمان تثبيت نظيف
          npm install              # تثبيت كل ما في package.json
          npm install framer-motion # تثبيت المكتبة المفقودة يدوياً
          npm run build            # بناء المشروع
          npx cap add android || true
          npx cap sync android

      - name: Force Native Configuration
        run: |
          # هنا نقوم بفرض إعدادات Native داخل ملفات الأندرويد التي تم إنشاؤها للتو
          # لنمنع أي سلوك "متصفح"
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          
      - name: Compile Native Binary
        run: |
          cd android
          # البناء بصيغة Native Binary وليس Webview
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME
          
      - name: Upload Final Native APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardshati-Native-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
