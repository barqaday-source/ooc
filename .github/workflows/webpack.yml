name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. التنظيف العميق واستبدال الحزمة
      - name: Deep Clean & Force Rename
        run: |
          find . -type f -exec sed -i 's/com.joud.chat/com.drdshati.app/g' {} +

      # 2. إعداد Node الإصدار 20 لحل مشاكل Supabase
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. تثبيت الاعتماديات مع تجاوز التعارض
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      # 4. التزامن الصارم (الترتيب هنا يمنع اختفاء الملفات)
      - name: Sync Capacitor
        run: |
          # إضافة الأندرويد إذا لم يكن موجوداً
          npx cap add android || echo "Android already exists"
          # نسخ ملفات الويب والـ assets أولاً (حل مشكلة ENOENT)
          npx cap copy android
          # تحديث الإضافات
          npx cap update android
          # المزامنة النهائية
          npx cap sync android

      # 5. البناء
      - name: Build APK
        run: |
          cd android
          rm -rf app/build .gradle
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # 6. رفع الملف
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
