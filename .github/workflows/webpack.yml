name: Strict Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }

      - name: Build Web & Sync
        run: |
          npm install --legacy-peer-deps
          npm run build
          npx cap sync android

      - name: Create Secrets (Securely)
        run: |
          # إنشاء ملف التوقيع
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/dardshati-release.keystore
          
          # إنشاء ملف الخصائص
          cat > android/app/signing.properties <<EOF
          storeFile=dardshati-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          
          # وضع ملف جوجل الموثوق
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Strict Gradle Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardshati-Final-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
