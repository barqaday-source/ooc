name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deep Clean & Force Rename
        run: |
          find . -type f -exec sed -i 's/com.joud.chat/com.drdshati.app/g' {} +

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: |
          npx cap add android || echo "Android already exists"
          npx cap copy android
          npx cap update android
          npx cap sync android

      - name: Build and Sign APK
        run: |
          cd android
          # إنشاء المفتاح الثابت
          keytool -genkey -v -keystore my-release-key.keystore -alias dardshati -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Dardshati, OU=App, O=Dardshati, L=Basra, S=Basra, C=IQ"
          
          # عرض البصمة (انسخها من الـ Logs بعد انتهاء العملية)
          keytool -list -v -keystore my-release-key.keystore -alias dardshati -storepass 123456
          
          # البناء باستخدام المفتاح الذي أنشأناه
          rm -rf app/build .gradle
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.injected.signing.store.file=my-release-key.keystore -Pandroid.injected.signing.store.password=123456 -Pandroid.injected.signing.key.alias=dardshati -Pandroid.injected.signing.key.password=123456

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
