name: Build Native Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Java & Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Install Dependencies & Build
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps
          npm run build
          
      - name: Sync Native Android
        run: |
          npx cap add android || true
          npx cap sync android
          
      - name: Configure Native Settings
        run: |
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          
      - name: Compile Native Binary
        run: |
          cd android
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME
          
      - name: Upload Final Native APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardshati-Native-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
