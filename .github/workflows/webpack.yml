name: Build Native Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Remove old android folder
        run: rm -rf android

      - name: Add Android fresh
        run: |
          npx cap add android
          npx cap sync android

      - name: Decode Keystore from Secrets
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/dardshati-release.keystore

      - name: Configure Gradle Signing
        run: |
          cat >> android/app/build.gradle <<EOF

          android {
              signingConfigs {
                  release {
                      storeFile file("dardshati-release.keystore")
                      storePassword "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
                      keyAlias "${{ secrets.ANDROID_KEY_ALIAS }}"
                      keyPassword "${{ secrets.ANDROID_KEY_PASSWORD }}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          EOF

      - name: Inject Mic permissions to Manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<uses-permission android:name="android.permission.INTERNET"/a\ <uses-permission android:name="android.permission.RECORD_AUDIO" />\n <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' $MANIFEST
          sed -i 's/android:windowSoftInputMode="adjustNothing"/android:windowSoftInputMode="adjustResize"/' $MANIFEST
          sed -i '/android:hardwareAccelerated="true"/a\ android:requestLegacyExternalStorage="true"' $MANIFEST

      - name: Register VoiceRecorder plugin in MainActivity
        run: |
          MAINACTIVITY=$(find android/app/src/main/java -name MainActivity.java)
          sed -i '/import com.getcapacitor.BridgeActivity;/a import capacitor.voice.recorder.VoiceRecorder;' $MAINACTIVITY
          sed -i '/registerPlugin(GoogleAuth.class);/a\ registerPlugin(VoiceRecorder.class);' $MAINACTIVITY

      - name: Inject Google Client IDs
        run: |
          CONFIG="src/lib/app.config.json"
          sed -i 's/"GOOGLE_CLIENT_ID_ANDROID": ".*"/"GOOGLE_CLIENT_ID_ANDROID": "${{ secrets.GOOGLE_CLIENT_ID_ANDROID }}"/' $CONFIG
          sed -i 's/"GOOGLE_CLIENT_ID_WEB": ".*"/"GOOGLE_CLIENT_ID_WEB": "${{ secrets.GOOGLE_CLIENT_ID_WEB }}"/' $CONFIG

      - name: Print Release SHA-1 for Google Console
        run: |
          echo "=============================="
          echo " RELEASE SHA-1 FOR GOOGLE CONSOLE "
          echo "=============================="
          keytool -list -v -keystore android/app/dardshati-release.keystore -storepass ${{ secrets.ANDROID_KEYSTORE_PASSWORD }} -alias ${{ secrets.ANDROID_KEY_ALIAS }} | grep "SHA1"
          echo ""
          echo "Package Name:"
          cat android/app/build.gradle | grep "applicationId"
          echo ""
          echo "تأكد هذني موجودات بالضبط بـ Google Cloud Console > Credentials > Android Client"
          echo "=============================="

      - name: Compile Release APK
        run: |
          cd android
          yes | sdkmanager --licenses || true
          chmod +x gradlew
         ./gradlew assembleRelease --stacktrace

      - name: Upload Final Native APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardshati-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
