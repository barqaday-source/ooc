name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --force

      - name: Build Web Assets
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Remove Old Android Build
        run: rm -rf android

      - name: Add Android Platform
        run: npx cap add android

      - name: Create Keystore Directory
        run: mkdir -p android/app

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/dardshat.jks

      - name: Verify Keystore File
        run: |
          ls -la android/app/dardshat.jks
          file android/app/dardshat.jks

      - name: Copy Web Assets + Sync Plugins
        run: npx cap sync android

      - name: Build Signed Debug APK
        env:
          KEYSTORE_FILE: dardshat.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: دردشاتي-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
