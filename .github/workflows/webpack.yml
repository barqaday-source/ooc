name: Full Android APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js & Java
        uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }

      - name: Install Dependencies & Build Web
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Initialize Android Project
        run: |
          # إضافة الأندرويد من الصفر
          npx cap add android
          npx cap sync android

      - name: Inject Google Config & Permissions
        run: |
          # 1. حقن ملف جوجل (بأمان)
          printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          
          # 2. حقن صلاحيات المايكروفون (RECORD_AUDIO & MODIFY_AUDIO_SETTINGS)
          # نستخدم sed للبحث عن سطر الإنترنت وإضافة صلاحيات المايك بعده
          sed -i '/<uses-permission android:name="android.permission.INTERNET"/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml
          
          # 3. ضبط الكيبورد ليكون ثابت (لا يرفع الواجهة)
          sed -i 's/android:windowSoftInputMode="adjustNothing"/android:windowSoftInputMode="adjustPan"/' android/app/src/main/AndroidManifest.xml

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Drdshati-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
