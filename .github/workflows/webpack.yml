name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # خطوة التنظيف العميق: البحث والاستبدال في كل الملفات
      - name: Deep Clean & Force Rename
        run: |
          echo "جاري البحث واستبدال الاسم القديم في كل المشروع..."
          find . -type f -exec sed -i 's/com.joud.chat/com.drdshati.app/g' {} +
          echo "تم استبدال كل أثر لـ com.joud.chat بـ com.drdshati.app"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # خطوة بناء نظيفة جداً
      - name: Build APK
        run: |
          cd android
          # إزالة أي مجلد build أو cache قديم قبل البناء
          rm -rf app/build .gradle
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
