name: Build Pro Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }

      - name: Build Web and Prepare Android
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/cli @codetrix-studio/capacitor-google-auth
          npm run build
          npx cap add android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Patch and Build
        run: |
          # 1. تحديث الأذونات الأساسية (الكاميرا، المايك، والإنترنت)
          sed -i '/<uses-permission/d' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.RECORD_AUDIO" />\n<uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          
          # 2. حقن الـ Google Auth في MainActivity ليعمل كتطبيق وليس كصفحة ويب
          sed -i '/import com.getcapacitor.BridgeActivity;/a import com.codetrixstudio.capacitor.GoogleAuth.GoogleAuth;' android/app/src/main/java/com/joud/chat/MainActivity.java
          sed -i '/public class MainActivity extends BridgeActivity {/a \  @Override\n  public void onCreate(Bundle savedInstanceState) {\n    registerPlugin(GoogleAuth.class);\n    super.onCreate(savedInstanceState);\n  }' android/app/src/main/java/com/joud/chat/MainActivity.java

          # 3. إعداد الـ Caching ليعمل التطبيق بدون إنترنت (بدلاً من الصفحة الفارغة)
          sed -i '/super.onCreate/a \    WebView webView = getBridge().getWebView();\n    webView.getSettings().setCacheMode(WebSettings.LOAD_CACHE_ELSE_NETWORK);\n    webView.getSettings().setDomStorageEnabled(true);' android/app/src/main/java/com/joud/chat/MainActivity.java

          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
