name: Build Pro Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }

      - name: Install and Build
        run: |
          # حذف أي تعارضات سابقة
          rm -rf node_modules package-lock.json
          # تثبيت المكاتب بالقوة لتجاوز صراع الإصدارات
          npm install --legacy-peer-deps
          npm install @capacitor/core@latest @capacitor/android@latest @capacitor/cli@latest @codetrix-studio/capacitor-google-auth@latest --legacy-peer-deps
          npm run build
          npx cap add android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Patch Android Config
        run: |
          # 1. إجبار التطبيق على فتح المايكروفون (بدون كروت النظام المزعجة)
          sed -i '/<uses-permission/d' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.RECORD_AUDIO" />\n<uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          
          # 2. تحويل تسجيل الدخول من متصفح إلى Native (حل الـ disallowed_useragent)
          sed -i '/import com.getcapacitor.BridgeActivity;/a import com.codetrixstudio.capacitor.GoogleAuth.GoogleAuth;' android/app/src/main/java/com/joud/chat/MainActivity.java
          sed -i '/public class MainActivity extends BridgeActivity {/a \  @Override\n  public void onCreate(Bundle savedInstanceState) {\n    registerPlugin(GoogleAuth.class);\n    super.onCreate(savedInstanceState);\n  }' android/app/src/main/java/com/joud/chat/MainActivity.java

          npx cap sync android
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
