name: Build Pro Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }

      - name: Build and Sync
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/cli @codetrix-studio/capacitor-google-auth framer-motion lucide-react --legacy-peer-deps
          npm run build
          npx cap add android
          
          # استبدال الملفات بملفاتك الجاهزة الموجودة في مجلد android_templates
          cp android_templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android_templates/MainActivity.java android/app/src/main/java/com/joud/chat/MainActivity.java
          
          # تحديث الـ SDK فقط (هذا لا يكسر الكود)
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle

          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
