name: Build Pro Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }

      - name: Build Web
        run: |
          npm install --legacy-peer-deps
          npm run build
          npx cap add android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create Keystore and Build
        run: |
          # 1. إنشاء مفتاح توقيع ثابت إذا لم يكن موجوداً
          keytool -genkey -v -keystore my-release-key.jks -alias my-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Joud, OU=Chat, O=App, L=Basra, C=IQ"
          
          # 2. استخراج البصمة SHA-1 (سأعرضها لك في سجلات السيرفر)
          keytool -list -v -keystore my-release-key.jks -storepass password123 | grep SHA1
          
          # 3. توقيع التطبيق باستخدام هذا المفتاح
          cd android
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=../my-release-key.jks \
            -Pandroid.injected.signing.store.password=password123 \
            -Pandroid.injected.signing.key.alias=my-alias \
            -Pandroid.injected.signing.key.password=password123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
