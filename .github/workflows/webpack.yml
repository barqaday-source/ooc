name: Build Pro Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }

      - name: Full Setup and Injection
        run: |
          npm install
          npm install @capacitor/android @capacitor/cli @codetrix-studio/capacitor-google-auth
          npm run build
          
          # 1. إنشاء مجلد الأندرويد
          npx cap add android
          
          # 2. حقن الأذونات
          sed -i '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" />\
          <uses-permission android:name="android.permission.RECORD_AUDIO" />\
          <uses-permission android:name="android.permission.CAMERA" />\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          
          # 3. ضبط الكيبورد
          sed -i 's/android:windowSoftInputMode=".*"/android:windowSoftInputMode="adjustResize"/' android/app/src/main/AndroidManifest.xml || \
          sed -i '/android:name=".MainActivity"/a \            android:windowSoftInputMode="adjustResize"' android/app/src/main/AndroidManifest.xml

          # 4. تعديل الجافا (يجب أن يتم قبل الـ Sync)
          sed -i '/import com.getcapacitor.BridgeActivity;/a import com.codetrixstudio.capacitor.GoogleAuth.GoogleAuth;' android/app/src/main/java/*/MainActivity.java
          sed -i '/super.onCreate(savedInstanceState);/i \    registerPlugin(GoogleAuth.class);' android/app/src/main/java/*/MainActivity.java

          # 5. المزامنة النهائية
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
