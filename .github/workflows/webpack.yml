name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Plugin Configuration
        run: |
          echo "--- Locating and Verifying MainActivity.java ---"
          FILE_PATH=$(find android/app/src/main/java -name "MainActivity.java" | head -n 1)
          
          if [ -z "$FILE_PATH" ]; then
            echo "::error:: MainActivity.java NOT FOUND!"
            exit 1
          fi
          
          # التحقق من وجود الإضافات في ملف الجافا
          if grep -q "GoogleAuth" "$FILE_PATH" && grep -q "VoiceRecorder" "$FILE_PATH"; then
            echo "SUCCESS: Plugins found in $FILE_PATH"
          else
            echo "::error:: FAILED: GoogleAuth or VoiceRecorder NOT registered in $FILE_PATH"
            echo "Current file content:"
            cat "$FILE_PATH"
            exit 1
          fi

      - name: Build and Sign APK
        run: |
          KEYSTORE_PATH=$(pwd)/android/app/my-release-key.keystore
          cd android
          ./gradlew clean assembleRelease \
          -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
          -Pandroid.injected.signing.store.password=123456 \
          -Pandroid.injected.signing.key.alias=dardshati \
          -Pandroid.injected.signing.key.password=123456

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
