name: Build Pro Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }

      - name: Build and Sync
        run: |
          npm install
          npm install @capacitor/android @capacitor/cli @codetrix-studio/capacitor-google-auth
          npm run build
          rm -rf android
          npx cap add android
          
          # إجبار نسخة الـ SDK على التوافق
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 23/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle

          # حقن الأذونات
          sed -i '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" />\
          <uses-permission android:name="android.permission.RECORD_AUDIO" />\
          <uses-permission android:name="android.permission.CAMERA" />\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          
          # حقن الكود للجافا
          sed -i '/import com.getcapacitor.BridgeActivity;/a import com.codetrixstudio.capacitor.GoogleAuth.GoogleAuth;' android/app/src/main/java/*/MainActivity.java
          sed -i '/super.onCreate(savedInstanceState);/i \    registerPlugin(GoogleAuth.class);' android/app/src/main/java/*/MainActivity.java
          
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
