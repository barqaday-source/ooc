name: Build Pro Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: 'package.json' }

      - name: Build Web and Prepare Android
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/cli @codetrix-studio/capacitor-google-auth framer-motion lucide-react --legacy-peer-deps
          npm run build
          npx cap add android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Patch and Build
        run: |
          # 1. تحديث الـ SDK
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle

          # 2. حقن الأذونات + ضبط الكيبورد adjustPan
          sed -i '/<uses-permission/d' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n<uses-permission android:name="android.permission.RECORD_AUDIO" />\n<uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          
          # 3. ضبط الكيبورد لمنع صعود الواجهة
          sed -i 's/android:windowSoftInputMode="[^"]*"/android:windowSoftInputMode="adjustPan"/g' android/app/src/main/AndroidManifest.xml
          
          # 4. في حالة ما كان موجود أصلاً، نضيفه
          grep -q 'android:windowSoftInputMode' android/app/src/main/AndroidManifest.xml || sed -i 's/<activity/<activity android:windowSoftInputMode="adjustPan"/' android/app/src/main/AndroidManifest.xml
          
          # 5. تسجيل Google Auth
          find android/app/src/main/java -name "MainActivity.java" -exec sed -i '/import com.getcapacitor.BridgeActivity;/a import com.codetrixstudio.capacitor.GoogleAuth.GoogleAuth;' {} +
          find android/app/src/main/java -name "MainActivity.java" -exec sed -i '/public class MainActivity extends BridgeActivity {/a @Override\npublic void onCreate(Bundle savedInstanceState) {\nregisterPlugin(GoogleAuth.class);\nsuper.onCreate(savedInstanceState);\n}' {} +
          
          npx cap sync android
          
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
