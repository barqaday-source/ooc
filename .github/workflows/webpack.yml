name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. التنظيف العميق واستبدال الحزمة
      - name: Deep Clean & Force Rename
        run: |
          find . -type f -exec sed -i 's/com.joud.chat/com.drdshati.app/g' {} +

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      # 2. خطوة التحديث والمزامنة مع تجاوز التعارض
      - name: Sync Capacitor
        run: |
          # تثبيت الإضافات مع تجاوز قيود الإصدارات
          npm install --legacy-peer-deps
          
          # إنشاء مشروع الأندرويد إذا كان مفقوداً
          npx cap add android || echo "Android project already exists"
          
          # تحديث ومزامنة الملفات
          npx cap update android
          npx cap copy android
          npx cap sync android

      # 3. خطوة البناء النظيف
      - name: Build APK
        run: |
          cd android
          rm -rf app/build .gradle
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # 4. رفع الملف بمسار شامل يضمن العثور عليه
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
