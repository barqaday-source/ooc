name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: |
          rm -rf android
          npx cap add android
          npx cap copy android
          npx cap update android
          npx cap sync android

      - name: Build and Sign APK
        run: |
          cd android
          # 1. إنشاء المفتاح مباشرة داخل مجلد android
          keytool -genkey -v -keystore my-release-key.keystore -alias dardshati -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Dardshati, OU=App, O=Dardshati, L=Basra, ST=Basra, C=IQ" -noprompt || true
          
          # 2. تحديد المسار الكامل للمفتاح لضمان العثور عليه
          KEYSTORE_PATH=$(pwd)/my-release-key.keystore
          
          # 3. البناء مع تمرير المسار الكامل
          ./gradlew clean assembleDebug \
          -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
          -Pandroid.injected.signing.store.password=123456 \
          -Pandroid.injected.signing.key.alias=dardshati \
          -Pandroid.injected.signing.key.password=123456

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
