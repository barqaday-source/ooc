name: Build Pro Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build Web + Sync Capacitor
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/cli @codetrix-studio/capacitor-google-auth framer-motion lucide-react --legacy-peer-deps
          npm run build
          
          rm -rf android
          npx cap add android
          
          sleep 10
          
          # تعديل build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          
          # تعديل AndroidManifest.xml وإضافة الصلاحيات
          sed -i '/<uses-permission/d' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n<uses-permission android:name="android.permission.RECORD_AUDIO" />\n<uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          
          # تسجيل GoogleAuth Plugin في MainActivity.java
          find android/app/src/main/java -name "MainActivity.java" -exec sed -i '/import com.getcapacitor.BridgeActivity;/a import android.os.Bundle;\nimport com.codetrixstudio.capacitor.GoogleAuth.GoogleAuth;' {} +
          find android/app/src/main/java -name "MainActivity.java" -exec sed -i '/public class MainActivity extends BridgeActivity {/a \ \ @Override\n\ \ public void onCreate(Bundle savedInstanceState) {\n\ \ \ \ registerPlugin(GoogleAuth.class);\n\ \ \ \ super.onCreate(savedInstanceState);\n\ \ }' {} +
          
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
