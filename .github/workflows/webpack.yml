name: Build Release APK - Fixed Signing
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Copy web assets to android
        run: npx cap copy android

      - name: Add google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Add Release Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/dardshati-release.keystore

      - name: Create signing.properties in correct path
        run: |
          cat > android/app/signing.properties <<EOF
          storeFile=dardshati-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Inject Mic permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<uses-permission android:name="android.permission.INTERNET"/a\ <uses-permission android:name="android.permission.RECORD_AUDIO" />\n <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' $MANIFEST

      - name: Register VoiceRecorder
        run: |
          MAINACTIVITY=$(find android/app/src/main/java -name MainActivity.java)
          grep -q "VoiceRecorder" $MAINACTIVITY || sed -i '/import com.getcapacitor.BridgeActivity;/a import capacitor.voice.recorder.VoiceRecorder;' $MAINACTIVITY
          grep -q "registerPlugin(VoiceRecorder.class)" $MAINACTIVITY || sed -i '/super.onCreate(savedInstanceState);/a\ registerPlugin(VoiceRecorder.class);' $MAINACTIVITY

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
         ./gradlew assembleRelease --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardshati-Release
          path: android/app/build/outputs/apk/release/app-release.apk
